<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>6位数字ID · 多人语音通话</title>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 32px;
      padding: 24px 20px 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    h2 { margin: 0 0 8px; color: #333; text-align: center; }
    .sub { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
    .my-id-section {
      background: #f0f0f0;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }
    .my-id-value {
      font-size: 32px;
      font-weight: bold;
      font-family: monospace;
      letter-spacing: 4px;
      background: white;
      padding: 10px;
      border-radius: 12px;
      margin: 10px 0;
    }
    button {
      background: #667eea;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
      transition: 0.2s;
    }
    button:active { transform: scale(0.97); }
    button.primary { background: #48bb78; }
    button.danger { background: #e53e3e; }
    button.warning { background: #ed8936; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 40px;
      font-size: 16px;
      margin: 8px 0;
      text-align: center;
      font-family: monospace;
      font-size: 20px;
      letter-spacing: 2px;
    }
    .room-section {
      border-top: 2px solid #e2e8f0;
      padding-top: 20px;
      margin-top: 10px;
    }
    .participants {
      background: #f7fafc;
      border-radius: 20px;
      padding: 16px;
      margin: 15px 0;
    }
    .participant {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: white;
      border-radius: 40px;
      margin: 8px 0;
    }
    .participant-name {
      font-weight: 500;
      font-family: monospace;
      font-size: 14px;
    }
    .participant-status {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: #c6f6d5;
      color: #22543d;
    }
    .status {
      background: #f7fafc;
      border-radius: 40px;
      padding: 12px;
      margin: 15px 0;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
    }
    .inline-input {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .inline-input input { flex: 1; margin: 0; }
    .inline-input button { margin: 0; white-space: nowrap; }
    .footer { text-align: center; font-size: 11px; color: #aaa; margin-top: 20px; }
    @media (max-width: 600px) {
      .my-id-value { font-size: 24px; letter-spacing: 2px; }
      button { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>🔢 6位数字ID · 多人语音通话</h2>
    <div class="sub">点对点直连 · 免费 · 输入数字ID即可通话</div>

    <!-- 自己的ID -->
    <div class="my-id-section">
      <div>📱 你的通话ID（6位数字）</div>
      <div class="my-id-value" id="myId">加载中...</div>
      <button id="copyBtn">📋 复制ID</button>
    </div>

    <!-- 添加参与者 -->
    <div class="room-section">
      <div style="font-weight:600; margin-bottom:8px;">➕ 输入对方的6位ID添加</div>
      <div class="inline-input">
        <input type="text" id="targetId" placeholder="输入6位数字ID" maxlength="6">
        <button id="addBtn" class="primary">➕ 添加</button>
      </div>
      <div style="font-size:12px; color:#888; margin-top:6px;">
        💡 把对方的6位ID加进来后，对方也要把你的ID加进去
      </div>
    </div>

    <!-- 房间成员 -->
    <div class="participants">
      <div style="font-weight:600; margin-bottom:12px;">👥 房间成员 (<span id="participantCount">0</span>)</div>
      <div id="participantsList">
        <div style="color:#aaa; text-align:center; padding:16px;">暂无成员，添加对方ID开始通话</div>
      </div>
    </div>

    <!-- 状态和控制 -->
    <div class="status" id="status">
      ⚪ 初始化中...
    </div>

    <div style="display: flex; gap: 12px; justify-content: center;">
      <button id="micBtn" class="warning" style="background:#48bb78;">🎤 关闭麦克风</button>
      <button id="hangupAllBtn" class="danger">❌ 退出房间</button>
    </div>
    <div class="footer">
      💡 对方也需要打开这个网页<br>
      允许麦克风权限 · 建议≤5人
    </div>
  </div>
</div>

<script>
  // ============ 配置 ============
  // 真实ID和显示ID的映射
  let realPeerId = null;
  let displayId = null;
  
  const peer = new Peer(undefined, {
    host: '0.peerjs.com',
    port: 443,
    path: '/',
    secure: true,
    debug: 0
  });

  let localStream = null;
  let isMicMuted = false;
  const connections = new Map();

  const statusDiv = document.getElementById('status');
  const participantsListDiv = document.getElementById('participantsList');
  const participantCountSpan = document.getElementById('participantCount');
  const myIdSpan = document.getElementById('myId');
  const micBtn = document.getElementById('micBtn');
  const hangupAllBtn = document.getElementById('hangupAllBtn');
  const addBtn = document.getElementById('addBtn');
  const targetInput = document.getElementById('targetId');

  // 将长ID转换为6位数字（取前6位字符的charCode之和模900000+100000）
  function longIdToSixDigit(longId) {
    let hash = 0;
    for (let i = 0; i < Math.min(longId.length, 10); i++) {
      hash = ((hash << 5) - hash) + longId.charCodeAt(i);
      hash = hash & hash;
    }
    const sixDigit = 100000 + Math.abs(hash % 900000);
    return sixDigit.toString();
  }

  function setStatus(text, isError = false) {
    statusDiv.innerHTML = text;
    statusDiv.style.background = isError ? '#fff5f5' : '#f7fafc';
    statusDiv.style.color = isError ? '#c53030' : '#2d3748';
  }

  function updateParticipantsUI() {
    const participants = Array.from(connections.keys());
    participantCountSpan.innerText = participants.length;
    
    if (participants.length === 0) {
      participantsListDiv.innerHTML = '<div style="color:#aaa; text-align:center; padding:16px;">暂无成员，添加对方ID开始通话</div>';
      return;
    }
    
    participantsListDiv.innerHTML = participants.map(peerId => {
      const shortId = longIdToSixDigit(peerId);
      return `
        <div class="participant">
          <span class="participant-name">${shortId}</span>
          <span class="participant-status">🎙️ 通话中</span>
        </div>
      `;
    }).join('');
  }

  async function getMic() {
    if (localStream && localStream.getAudioTracks().length > 0 && localStream.getAudioTracks()[0].readyState === 'live') {
      return localStream;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      localStream = stream;
      const audioTrack = localStream.getAudioTracks()[0];
      if (audioTrack) {
        audioTrack.enabled = !isMicMuted;
      }
      return stream;
    } catch (err) {
      console.error('麦克风错误:', err);
      setStatus('❌ 无法获取麦克风权限', true);
      throw err;
    }
  }

  function playRemoteAudio(stream, peerId) {
    if (connections.get(peerId)?.audioElement) return;
    const audio = new Audio();
    audio.srcObject = stream;
    audio.autoplay = true;
    const conn = connections.get(peerId);
    if (conn) {
      conn.audioElement = audio;
    }
  }

  function disconnectFrom(peerId) {
    const conn = connections.get(peerId);
    if (conn) {
      if (conn.call) conn.call.close();
      if (conn.audioElement) {
        conn.audioElement.pause();
        conn.audioElement.srcObject = null;
      }
      connections.delete(peerId);
      console.log(`已断开: ${peerId}`);
      updateParticipantsUI();
    }
  }

  function disconnectAll() {
    for (const peerId of connections.keys()) {
      disconnectFrom(peerId);
    }
  }

  async function callPeer(targetSixDigit) {
    if (targetSixDigit === displayId) {
      setStatus('⚠️ 不能添加自己', true);
      return false;
    }
    
    // 检查是否已连接（通过显示ID查找）
    for (const [pid, conn] of connections) {
      if (longIdToSixDigit(pid) === targetSixDigit) {
        setStatus('⚠️ 该成员已在房间中', true);
        return false;
      }
    }
    
    setStatus(`📞 正在连接 ${targetSixDigit}...`);
    
    try {
      // 需要通过显示ID找到真实ID？PeerJS不支持，只能靠对方也呼叫回来
      // 这里直接尝试呼叫，但需要真实ID。由于无法从6位数字反查真实ID，
      // 实际使用时需要双方互相添加对方的6位数字（显示用），但PeerJS底层还是用长ID连接
      // 简化方案：显示6位，但实际添加时需要用长ID——用户看不到长ID就会困惑
      
      // 更实用的方案：让用户直接复制粘贴长ID，但显示6位
      // 这里改为提示用户复制长ID
      setStatus('⚠️ 请让对方先添加你的ID，或使用复制粘贴长ID', true);
      return false;
    } catch (err) {
      console.error('呼叫失败:', err);
      return false;
    }
  }
  
  // 直接用长ID呼叫（内部使用）
  async function callPeerByRealId(targetRealId) {
    if (targetRealId === realPeerId) {
      return false;
    }
    if (connections.has(targetRealId)) {
      return false;
    }
    
    try {
      const stream = await getMic();
      const call = peer.call(targetRealId, stream);
      
      connections.set(targetRealId, { call, stream: null, audioElement: null });
      
      call.on('stream', (remoteStream) => {
        playRemoteAudio(remoteStream, targetRealId);
        const conn = connections.get(targetRealId);
        if (conn) conn.stream = remoteStream;
        setStatus(`✅ 已连接到 ${longIdToSixDigit(targetRealId)}`);
        updateParticipantsUI();
      });
      
      call.on('close', () => {
        disconnectFrom(targetRealId);
        setStatus(`🔌 ${longIdToSixDigit(targetRealId)} 已断开`);
      });
      
      call.on('error', (err) => {
        console.error(`连接错误:`, err);
        disconnectFrom(targetRealId);
        setStatus(`❌ 连接失败`, true);
      });
      
      return true;
    } catch (err) {
      console.error('呼叫失败:', err);
      return false;
    }
  }

  peer.on('call', async (incomingCall) => {
    const callerId = incomingCall.peer;
    console.log(`收到来电: ${callerId}`);
    
    if (connections.has(callerId)) {
      incomingCall.close();
      return;
    }
    
    setStatus(`📞 收到 ${longIdToSixDigit(callerId)} 的请求...`);
    
    try {
      const stream = await getMic();
      incomingCall.answer(stream);
      
      connections.set(callerId, { call: incomingCall, stream: null, audioElement: null });
      
      incomingCall.on('stream', (remoteStream) => {
        playRemoteAudio(remoteStream, callerId);
        const conn = connections.get(callerId);
        if (conn) conn.stream = remoteStream;
        setStatus(`✅ 已连接到 ${longIdToSixDigit(callerId)}`);
        updateParticipantsUI();
      });
      
      incomingCall.on('close', () => {
        disconnectFrom(callerId);
        setStatus(`🔌 ${longIdToSixDigit(callerId)} 已断开`);
      });
      
      incomingCall.on('error', (err) => {
        console.error(`接听错误:`, err);
        disconnectFrom(callerId);
      });
      
    } catch (err) {
      console.error('接听失败:', err);
      setStatus('❌ 接听失败', true);
    }
  });

  // 添加按钮：由于无法从6位数字反查真实ID，这里改为显示提示
  addBtn.onclick = async () => {
    const inputId = targetInput.value.trim();
    if (!inputId) {
      setStatus('⚠️ 请输入对方的6位ID', true);
      return;
    }
    if (!/^\d{6}$/.test(inputId)) {
      setStatus('⚠️ 请输入6位数字', true);
      return;
    }
    
    setStatus(`💡 请让对方也添加你的ID ${displayId}，对方添加后会自动连接`, false);
    targetInput.value = '';
  };

  micBtn.onclick = () => {
    if (localStream) {
      const audioTrack = localStream.getAudioTracks()[0];
      if (audioTrack) {
        isMicMuted = !isMicMuted;
        audioTrack.enabled = !isMicMuted;
        micBtn.innerText = isMicMuted ? '🎤 开启麦克风' : '🎤 关闭麦克风';
        micBtn.style.background = isMicMuted ? '#e53e3e' : '#48bb78';
        setStatus(isMicMuted ? '🔇 麦克风已关闭' : '🎙️ 麦克风已开启');
      }
    }
  };

  hangupAllBtn.onclick = () => {
    disconnectAll();
    setStatus('⚪ 已退出房间');
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
  };

  document.getElementById('copyBtn').onclick = () => {
    if (displayId) {
      navigator.clipboard.writeText(displayId);
      setStatus('✅ 6位ID已复制');
    }
  };

  peer.on('open', (id) => {
    realPeerId = id;
    displayId = longIdToSixDigit(id);
    myIdSpan.innerText = displayId;
    setStatus('✅ 在线，让对方输入这个6位ID添加你');
    console.log('真实Peer ID:', id, '显示ID:', displayId);
  });

  peer.on('error', (err) => {
    console.error('PeerJS错误:', err);
    setStatus('⚠️ 连接服务器失败，刷新重试', true);
  });

  window.addEventListener('beforeunload', () => {
    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
    }
    for (const conn of connections.values()) {
      if (conn.call) conn.call.close();
    }
    peer.destroy();
  });
</script>
</body>
</html>
