<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#e8ecf1;display:flex;justify-content:center;align-items:center;height:100vh}
    .cont{width:100vw;max-width:440px;height:100vh;max-height:680px;background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow:hidden}
    .top{background:#5c6bc0;color:#fff;padding:15px;text-align:center;font-weight:600}
    #msgs{flex:1;overflow-y:auto;padding:14px;background:#fafbfc}
    .msg-row{display:flex;align-items:flex-start;margin-bottom:12px;gap:8px}
    .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover;background:#d0d7e2}
    .msg-content{background:#f0f2f5;border-radius:10px;padding:8px 12px;max-width:75%;word-break:break-word}
    .msg-content .name{color:#5c6bc0;font-size:12px;font-weight:600;margin-bottom:3px}
    .msg-content .text{font-size:14px;white-space:pre-wrap;line-height:1.4}
    .msg-content img{max-width:200px;max-height:200px;border-radius:6px;margin-top:4px;display:block}
    .bar{padding:8px;border-top:1px solid #eee;display:flex;align-items:center;gap:6px;background:#fff}
    .bar input[type="text"]{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:18px;outline:none;font-size:14px}
    .bar button{padding:10px 14px;background:#5c6bc0;color:#fff;border:none;border-radius:18px;font-weight:500;cursor:pointer;font-size:14px;white-space:nowrap}
    #imgInput{display:none}
    .enter{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:28px;gap:12px}
    .enter input[type="text"]{width:100%;padding:12px;font-size:16px;border:2px solid #ddd;border-radius:10px;outline:none}
    .enter button{padding:12px 30px;background:#5c6bc0;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:500}
    .avatar-pick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .avatar-pick img{width:48px;height:48px;border-radius:50%;border:3px solid transparent;cursor:pointer;object-fit:cover}
    .avatar-pick img.sel{border-color:#5c6bc0}
    .hidden{display:none!important}
  </style>
</head>
<body>

<div class="cont">
  <div class="top" id="title">💬 聊天室</div>

  <div id="login" class="enter">
    <h3>输入昵称</h3>
    <input id="nick" placeholder="你的昵称" autocomplete="off">
    <p style="font-size:13px;color:#888">选一个头像</p>
    <div class="avatar-pick" id="avatars"></div>
    <button id="goBtn">开始聊天</button>
  </div>

  <div id="room" class="hidden" style="display:flex;flex-direction:column;height:100%">
    <div id="msgs"></div>
    <div class="bar">
      <input type="file" id="imgInput" accept="image/*">
      <button onclick="document.getElementById('imgInput').click()" style="background:#8e99a3;padding:10px 12px;font-size:18px">🖼️</button>
      <input id="say" placeholder="发一句话..." autocomplete="off">
      <button id="sendBtn">发送</button>
    </div>
  </div>
</div>

<script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>
<script>
  // ========== 配置(改这里)==========
  const CHANNEL_ID = "SwLZhbOCTTsAcXaR";
  const IMGBB_KEY = "de1365709bd94acab828a7d6e6f35e36";  // 去 imgbb.com 免费拿
  // ===================================

  const presetAvatars = [
    "https://api.dicebear.com/7.x/thumbs/svg?seed=cat",
    "https://api.dicebear.com/7.x/thumbs/svg?seed=dog",
    "https://api.dicebear.com/7.x/thumbs/svg?seed=fox",
    "https://api.dicebear.com/7.x/thumbs/svg?seed=bird",
    "https://api.dicebear.com/7.x/thumbs/svg?seed=panda",
    "https://api.dicebear.com/7.x/thumbs/svg?seed=koala"
  ];

  let drone, myName = "", myAvatar = presetAvatars[0];

  // 生成头像选择
  presetAvatars.forEach((url, i) => {
    const img = document.createElement("img");
    img.src = url;
    img.onclick = () => {
      document.querySelectorAll(".avatar-pick img").forEach(el => el.classList.remove("sel"));
      img.classList.add("sel");
      myAvatar = url;
    };
    document.getElementById("avatars").appendChild(img);
    if (i === 0) img.classList.add("sel");
  });

  // 进入聊天
  document.getElementById("goBtn").onclick = () => {
    const nick = document.getElementById("nick").value.trim();
    if (!nick) return alert("请输入昵称");
    myName = nick;
    document.getElementById("title").textContent = "💬 聊天室 - " + myName;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("room").classList.remove("hidden");

    drone = new Scaledrone(CHANNEL_ID, { data: { name: myName, avatar: myAvatar } });

    drone.on("open", (error) => {
      if (error) return console.error(error);
      const room = drone.subscribe("observable-room");
      room.on("message", (msg) => showMessage(msg.data));
    });
  };

  // 显示消息
  function showMessage(data) {
    const { name, text, image, avatar } = data;
    const row = document.createElement("div");
    row.className = "msg-row";

    const av = document.createElement("img");
    av.className = "avatar";
    av.src = avatar || presetAvatars[0];

    const content = document.createElement("div");
    content.className = "msg-content";

    const nameEl = document.createElement("div");
    nameEl.className = "name";
    nameEl.textContent = name;

    const textEl = document.createElement("div");
    textEl.className = "text";
    textEl.textContent = text || "";

    content.appendChild(nameEl);
    content.appendChild(textEl);

    if (image) {
      const imgEl = document.createElement("img");
      imgEl.src = image;
      content.appendChild(imgEl);
    }

    row.appendChild(av);
    row.appendChild(content);
    document.getElementById("msgs").appendChild(row);
    document.getElementById("msgs").scrollTop = document.getElementById("msgs").scrollHeight;
  }

  // 发送文字
  function send() {
    const inp = document.getElementById("say");
    const txt = inp.value.trim();
    if (!txt || !drone) return;
    drone.publish({
      room: "observable-room",
      message: { name: myName, text: txt, avatar: myAvatar, image: null }
    });
    inp.value = "";
  }

  document.getElementById("sendBtn").onclick = send;
  document.getElementById("say").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });

  // 上传图片
  document.getElementById("imgInput").onchange = async (e) => {
    const file = e.target.files[0];
    if (!file || !drone) return;

    const form = new FormData();
    form.append("image", file);

    try {
      const res = await fetch("https://api.imgbb.com/1/upload?key=" + IMGBB_KEY, {
        method: "POST",
        body: form
      });
      const json = await res.json();
      if (json.success) {
        const url = json.data.url;
        drone.publish({
          room: "observable-room",
          message: { name: myName, text: "", avatar: myAvatar, image: url }
        });
      } else {
        alert("图片上传失败");
      }
    } catch (err) {
      alert("上传出错:" + err.message);
    }
    e.target.value = "";
  };
</script>

</body>
</html>
