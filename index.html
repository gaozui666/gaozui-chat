<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一起来聊天</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#e8ecf1;display:flex;justify-content:center;align-items:center;height:100vh}
    .cont{width:100vw;max-width:440px;height:100vh;max-height:620px;background:#fff;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow:hidden}
    .top{background:#5c6bc0;color:#fff;padding:15px;text-align:center;font-weight:600;letter-spacing:0.5px}
    #msgs{flex:1;overflow-y:auto;padding:14px;background:#fafbfc}
    .line{margin-bottom:9px;padding:8px 12px;background:#f0f2f5;border-radius:8px;display:inline-block;max-width:85%;word-break:break-word}
    .line b{color:#5c6bc0;display:block;font-size:13px;margin-bottom:2px}
    .line span{font-size:14px}
    .bar{padding:10px;border-top:1px solid #eee;display:flex;background:#fff}
    .bar input{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:18px;outline:none;font-size:15px}
    .bar button{margin-left:8px;padding:10px 18px;background:#5c6bc0;color:#fff;border:none;border-radius:18px;font-weight:500;cursor:pointer}
    .enter{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:28px}
    .enter input{width:100%;padding:12px;font-size:16px;border:2px solid #ddd;border-radius:10px;margin-bottom:12px;outline:none}
    .enter button{padding:12px 30px;background:#5c6bc0;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:500}
    .hidden{display:none!important}
  </style>
</head>
<body>

<div class="cont">
  <div class="top" id="title">💬 聊天室</div>

  <div id="login" class="enter">
    <h3 style="margin-bottom:16px">输入昵称</h3>
    <input id="nick" placeholder="你的昵称" autocomplete="off">
    <button onclick="go()">开始聊天</button>
  </div>

  <div id="room" class="hidden" style="display:flex;flex-direction:column;height:100%">
    <div id="msgs"></div>
    <div class="bar">
      <input id="say" placeholder="发一句话..." autocomplete="off">
      <button onclick="send()">发送</button>
    </div>
  </div>
</div>

<script type="module">
  // 👇👇👇 只改这一行,把引号里的东西换成你在 Scaledrone 拿到的 Channel ID
  const CHANNEL_ID = "SwLZhbOCTTsAcXaR";
  // 👆👆👆

  let drone, myName;

  window.go = () => {
    myName = document.getElementById("nick").value.trim();
    if (!myName) return;

    document.getElementById("title").textContent = `💬 聊天室 - ${myName}`;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("room").classList.remove("hidden");

    // 连 Scaledrone
    drone = new Scaledrone(CHANNEL_ID, { data: { name: myName } });

    drone.on("open", (error) => {
      if (error) return console.error(error);
    });

    const room = drone.subscribe("observable-room");

    room.on("message", (message) => {
      const { name, text } = message.data;
      const m = document.createElement("div");
      m.className = "line";
      m.innerHTML = `<b>${name}</b><span>${text}</span>`;
      document.getElementById("msgs").appendChild(m);
      document.getElementById("msgs").scrollTop = document.getElementById("msgs").scrollHeight;
    });
  };

  window.send = () => {
    const inp = document.getElementById("say");
    const txt = inp.value.trim();
    if (!txt) return;
    drone.publish({ room: "observable-room", message: { name: myName, text: txt } });
    inp.value = "";
  };

  document.getElementById("say").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });
</script>

<script src="https://cdn.scaledrone.com/scaledrone.min.js"></script>

</body>
</html>
