<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6位号语音通话</title>
    <style>
        body{max-width:450px;margin:50px auto;padding:0 20px;font-family:微软雅黑}
        .item{margin:20px 0}
        input{width:200px;padding:12px;font-size:18px;text-align:center;letter-spacing:6px}
        button{padding:12px 25px;font-size:16px;border:none;border-radius:6px;background:#1677ff;color:#fff;cursor:pointer;margin:8px}
        #tip{color:#666;margin-top:15px}
    </style>
</head>
<body>
    <h2>语音通话</h2>
    <div class="item">
        <input type="text" id="roomNum" maxlength="6" placeholder="输入6位数字">
    </div>
    <div class="item">
        <button onclick="createRoom()">创建房间发起通话</button>
        <button onclick="joinRoom()">加入房间接听</button>
        <button onclick="endCall()" style="background:#f53f3f">挂断</button>
    </div>
    <div id="tip">状态：等待操作</div>
    <audio id="audioPlay" autoplay hidden>

    <script>
        const ICE_CONFIG = {
            iceServers: [
                {urls:"stun:stun.l.google.com:19302"}
            ]
        }
        let pc, localStream, roomId
        let signalCache = {}

        const tip = document.getElementById('tip')
        const audioPlay = document.getElementById('audioPlay')
        const inputDom = document.getElementById('roomNum')

        // 获取麦克风
        async function getMic(){
            try{
                localStream = await navigator.mediaDevices.getUserMedia({audio:true})
                return true
            }catch{
                tip.innerText = "请允许麦克风权限"
                return false
            }
        }

        // 创建房间
        async function createRoom(){
            roomId = inputDom.value.trim()
            if(roomId.length!==6) return tip.innerText="请输入6位数字"
            if(!await getMic())return

            pc = new RTCPeerConnection(ICE_CONFIG)
            localStream.getAudioTracks().forEach(t=>pc.addTrack(t,localStream))
            pc.ontrack = e=>audioPlay.srcObject = e.streams[0]
            pc.onicecandidate = e=>{
                if(e.candidate) signalCache[roomId] = JSON.stringify(pc.localDescription)
            }

            const offer = await pc.createOffer()
            await pc.setLocalDescription(offer)
            tip.innerText = `房间${roomId}已创建，等待对方加入`
        }

        // 加入房间
        async function joinRoom(){
            roomId = inputDom.value.trim()
            if(roomId.length!==6) return tip.innerText="请输入6位数字"
            if(!await getMic())return

            pc = new RTCPeerConnection(ICE_CONFIG)
            localStream.getAudioTracks().forEach(t=>pc.addTrack(t,localStream))
            pc.ontrack = e=>audioPlay.srcObject = e.streams[0]
            pc.onicecandidate = e=>{
                if(e.candidate) signalCache[roomId] = JSON.stringify(pc.localDescription)
            }

            // 读取房间缓存信息配对
            let remoteInfo = signalCache[roomId]
            if(!remoteInfo){
                tip.innerText="暂无房间信息，稍等重试"
                return
            }
            let desc = JSON.parse(remoteInfo)
            await pc.setRemoteDescription(desc)
            const ans = await pc.createAnswer()
            await pc.setLocalDescription(ans)
            tip.innerText="已接入通话"
        }

        // 挂断通话
        function endCall(){
            if(pc) pc.close()
            if(localStream) localStream.getTracks().forEach(t=>t.stop())
            audioPlay.srcObject = null
            tip.innerText="通话已结束"
        }
    </script>
</body>
</html>
