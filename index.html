<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scaledrone 聊天室 | GitHub Pages</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 15px; }
  #wrap { max-width: 500px; margin: 0 auto; }
  #nick { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; font-size: 15px; }
  #chat { height: 420px; background: #1e293b; padding: 12px; border-radius: 8px; overflow-y: auto; margin-bottom: 10px; }
  .msg { padding: 8px 0; border-bottom: 1px solid #334155; }
  .name { color: #38bdf8; font-weight: bold; }
  #input { display: flex; gap: 8px; }
  #text { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; }
  button { padding: 12px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<div id="wrap">
  <input id="nick" placeholder="输入你的昵称">
  <div id="chat"></div>
  <div id="input">
    <input id="text" placeholder="输入消息...">
    <button onclick="send()">发送</button>
  </div>
</div>

<!-- Scaledrone CDN -->
<script src="https://unpkg.com/scaledrone@1.6.0/dist/scaledrone.min.js"></script>
<script>
  // 👇 换成你自己的 Channel ID（在 dashboard.scaledrone.com 创建）
  const CHANNEL_ID = "SwLZhbOCTTsAcXaR";
  const drone = new ScaleDrone(CHANNEL_ID);

  // 加入房间（房间名随便写，比如 "chat-room-001"）
  const room = drone.subscribe("chat-room-001");

  // 收到消息就显示
  room.on("data", (data) => {
    addMsg(data.nick, data.text);
  });

  // 连接成功提示
  drone.on("open", () => {
    addMsg("系统", "✅ 已连接聊天室");
  });

  function addMsg(nick, text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span class="name">${nick}</span>：${text}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function send() {
    const nick = document.getElementById("nick").value.trim();
    const text = document.getElementById("text").value.trim();
    if (!nick || !text) return;

    // 发消息到 Scaledrone
    drone.publish({
      room: "chat-room-001",
      message: { nick, text }
    });

    document.getElementById("text").value = "";
  }

  // 回车发送
  document.getElementById("text").addEventListener("keydown", e => {
    if (e.key === "Enter") send();
  });
</script>
</body>
</html>
