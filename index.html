<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨网实时语音通话 WebRTC</title>
    <style>
        *{box-sizing: border-box;margin:0;padding:0;}
        body{max-width:650px;margin:30px auto;padding:0 20px;font-family:system-ui;}
        .card{border:1px #eee solid;border-radius:12px;padding:20px;margin:15px 0;}
        button{padding:10px 18px;margin:6px;border:none;border-radius:6px;cursor:pointer;font-size:15px;}
        #openMic{background:#23c16c;color:#fff;}
        #createOffer{background:#2185f5;color:#fff;}
        #answerBtn{background:#722ed1;color:#fff;}
        #hangUp{background:#f53f3f;color:#fff;}
        textarea{width:100%;height:120px;margin:10px 0;padding:8px;border:1px #ddd solid;border-radius:6px;}
        .status{margin:12px 0;color:#555;}
    </style>
</head>
<body>
    <h2>跨网语音通话</h2>
    <div class="card">
        <button id="openMic">开启麦克风</button>
        <p class="status" id="status">状态：待机</p>
    </div>

    <div class="card">
        <button id="createOffer">发起通话</button>
        <button id="answerBtn">接听通话</button>
        <button id="hangUp">挂断通话</button>
    </div>

    <div class="card">
        <p>我方信息，复制发送给对方：</p>
        <textarea id="localInfo" readonly></textarea>
        <p>粘贴对方信息：</p>
        <textarea id="remoteInfo" placeholder="粘贴对方发来的文本"></textarea>
    </div>

    <audio id="remoteAudio" autoplay>

    <script>
        // 免费公开STUN服务器，实现跨网穿透
        const config = {
            iceServers: [
                {urls: 'stun:stun.l.google.com:19302'},
                {urls: 'stun:stun1.l.google.com:19302'}
            ]
        };

        let peerConn;
        let localStream;
        const remoteAudio = document.getElementById('remoteAudio');
        const statusText = document.getElementById('status');
        const localInfo = document.getElementById('localInfo');
        const remoteInfo = document.getElementById('remoteInfo');

        // 打开麦克风
        document.getElementById('openMic').addEventListener('click',async ()=>{
            try{
                localStream = await navigator.mediaDevices.getUserMedia({audio:true});
                statusText.innerText = "状态：麦克风已就绪，可以通话";
            }catch(e){
                statusText.innerText = "麦克风开启失败，请授权权限";
            }
        });

        // 发起呼叫
        document.getElementById('createOffer').addEventListener('click',async ()=>{
            if(!localStream) return alert("请先开启麦克风");
            peerConn = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track=>peerConn.addTrack(track,localStream));

            peerConn.ontrack = e=>remoteAudio.srcObject = e.streams[0];
            peerConn.onicecandidate = e=>{
                if(e.candidate) localInfo.value = JSON.stringify(peerConn.localDescription);
            };

            const offer = await peerConn.createOffer();
            await peerConn.setLocalDescription(offer);
            statusText.innerText = "状态：已发起呼叫，发送信息给对方";
        });

        // 接听呼叫
        document.getElementById('answerBtn').addEventListener('click',async ()=>{
            if(!localStream || !remoteInfo.value) return alert("请开启麦克风并粘贴对方信息");
            const remoteDesc = JSON.parse(remoteInfo.value);
            peerConn = new RTCPeerConnection(config);
            localStream.getTracks().forEach(track=>peerConn.addTrack(track,localStream));

            peerConn.ontrack = e=>remoteAudio.srcObject = e.streams[0];
            peerConn.onicecandidate = e=>{
                if(e.candidate) localInfo.value = JSON.stringify(peerConn.localDescription);
            };

            await peerConn.setRemoteDescription(remoteDesc);
            const answer = await peerConn.createAnswer();
            await peerConn.setLocalDescription(answer);
            statusText.innerText = "状态：等待对方确认连接";
        });

        // 挂断
        document.getElementById('hangUp').addEventListener('click',()=>{
            if(peerConn) peerConn.close();
            if(localStream) localStream.getTracks().forEach(track=>track.stop());
            remoteAudio.srcObject = null;
            localInfo.value = '';
            remoteInfo.value = '';
            statusText.innerText = "状态：通话已挂断";
        });
    </script>
</body>
</html>
